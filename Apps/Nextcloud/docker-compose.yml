      en_us: |
        **Quick Setup**

        After installation, log in with:
        | Field | Value |
        |-------|-------|
        | Username | `admin` |
        | Password | `$APP_DEFAULT_PASSWORD` |

        First-time install takes 1–3 minutes. If the page shows a "Gateway time-out" or appears stuck, **refresh** after a minute and you'll see the login screen.

        If you ever see a "mimetype migrations available" warning later, run from the CasaOS terminal:
        `docker exec nextcloud php occ maintenance:repair --include-expensive`
