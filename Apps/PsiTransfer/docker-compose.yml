      en_us: |
        ## Default Credentials
        
        | Field              | Value          |
        |--------------------|----------------|
        | Admin Password     | `$APP_DEFAULT_PASSWORD` |
        | Upload Password    | `$APP_DEFAULT_PASSWORD` |
        
        **Access Admin Panel:** Navigate to `$APP_DOMAIN/admin` and enter the admin password.
        
        **Important Notes:**
        - Files are stored in `/DATA/AppData/psitransfer/data/`
        - Default file retention is 24 hours (86400 seconds)
      ko_kr: |
        ## 기본 인증 정보
        
        | 항목              | 값             |
        |------------------|----------------|
        | 관리자 비밀번호    | `$APP_DEFAULT_PASSWORD` |
        | 업로드 비밀번호    | `$APP_DEFAULT_PASSWORD` |
        
        **관리자 패널 접근:** `$APP_DOMAIN/admin`으로 이동하여 관리자 비밀번호를 입력하세요.
        
        **중요 사항:**
        - 파일은 `/DATA/AppData/psitransfer/data/`에 저장됩니다
        - 기본 파일 보관 기간은 24시간(86400초)입니다