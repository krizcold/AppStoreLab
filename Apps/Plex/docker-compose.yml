name: plex

services:
  nginxhashlock:
    image: ghcr.io/yundera/nginx-hash-lock:latest
    container_name: plex-nginxhashlock
    restart: unless-stopped
    user: "root"
    environment:
      AUTH_HASH: $AUTH_HASH
      BACKEND_HOST: "plex"
      BACKEND_PORT: "32400"
      LISTEN_PORT: "80"
      ALLOWED_EXTENSIONS: "js,css,png,jpg,jpeg,gif,svg,ico,woff,woff2,ttf,eot"
      ALLOWED_PATHS: "web/index.html"
    expose:
      - 80
    labels:
      caddy_0: plex-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: plex-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: plex-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    depends_on:
      - plex
    deploy:
      resources:
        limits:
          memory: 128M
    cpu_shares: 80
    networks:
      - pcs

  plex:
    image: lscr.io/linuxserver/plex:1.43.0
    container_name: plex
    restart: unless-stopped
    user: "0:0"
    volumes:
      - /DATA/AppData/plex:/config
      - /DATA/AppData/plex/transcode:/transcode
      - /DATA/Media/Movies:/data/movies
      - /DATA/Media/TV Shows:/data/tvshows
      - /DATA/Media/Music:/data/music
      - /DATA/Downloads:/data/downloads
    environment:
      PGID: $PGID
      PUID: $PUID
      TZ: $TZ
      PLEX_CLAIM: ""
      VERSION: docker
    devices:
      - /dev/dri:/dev/dri
    deploy:
      resources:
        limits:
          memory: 1G
    privileged: true
    cpu_shares: 50
    networks:
      - pcs

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
