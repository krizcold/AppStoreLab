name: photobridge

services:
  photobridge:
    image: ghcr.io/bookjjun-ij/photobridge:0.2.0
    container_name: photobridge
    restart: unless-stopped
    user: "0:0"
    networks:
      - pcs
    expose:
      - "80"
    labels:
      caddy_0: photobridge-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.request_body.max_size: 10G
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: photobridge-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.request_body.max_size: 10G
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: photobridge-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.request_body.max_size: 10G
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    volumes:
      - /DATA/Gallery/Import:/import
    environment:
      TZ: $TZ
      IMMICH_URL: http://immich:80
      IMPORT_PATH: /import
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    cpu_shares: 50

networks:
  pcs:
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: photobridge
  webui_port: 80
  author: Yundera Team
  category: Utilities
  developer: Yundera
  store_app_id: photobridge
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/PhotoBridge/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/PhotoBridge/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/PhotoBridge/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/PhotoBridge/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/PhotoBridge/screenshot-1.png
  description:
    en_us: |
      **PhotoBridge for Immich — Photo & Video Importer**

      Import your photos and videos directly into Immich on your Yundera server. PhotoBridge wraps the immich-go tool with a simple web interface that handles validation, configuration, and real-time progress tracking.

      **Key Features:**
      - Import local files from the /import volume (no size limit)
      - Direct upload of photos, videos, or ZIP files from your browser
      - Automatic ZIP extraction with folder-based album creation
      - File validation before importing
      - Album and metadata preservation (dates, locations, descriptions)
      - Dry-run mode to preview before importing
      - Real-time import progress logs
      - Automatic duplicate detection

      **How to use:**
      1. Choose your import method:
         - **Local Files:** Place files in `/DATA/Gallery/Import/` via the Files app, then select them in PhotoBridge
         - **Direct Upload:** Upload files directly through PhotoBridge from your browser
      2. Open PhotoBridge and enter your Immich API key (grant all permissions)
      3. Select files, validate, and start import
    ko_kr: |
      **PhotoBridge for Immich — 사진 및 동영상 가져오기 도구**

      사진과 동영상을 Yundera 서버의 Immich로 직접 가져옵니다. PhotoBridge는 immich-go 도구를 간단한 웹 인터페이스로 감싸 검증, 설정, 실시간 진행 추적을 제공합니다.

      **주요 기능:**
      - /import 볼륨의 로컬 파일 가져오기 (크기 제한 없음)
      - 브라우저에서 사진, 동영상 또는 ZIP 파일 직접 업로드
      - 자동 ZIP 압축 해제 및 폴더 기반 앨범 생성
      - 가져오기 전 파일 검증
      - 앨범 및 메타데이터 보존 (날짜, 위치, 설명)
      - 드라이런 모드로 미리보기
      - 실시간 가져오기 진행 로그
      - 자동 중복 감지

      **사용 방법:**
      1. 가져오기 방법을 선택하세요:
         - **로컬 파일:** Files 앱으로 `/DATA/Gallery/Import/`에 파일을 넣은 후, PhotoBridge에서 선택
         - **직접 업로드:** 브라우저에서 PhotoBridge를 통해 직접 업로드
      2. PhotoBridge를 열고 Immich API 키 입력 (모든 권한 부여)
      3. 파일 선택, 검증 후 가져오기 시작
    zh_cn: |
      **PhotoBridge for Immich — 照片和视频导入工具**

      将您的照片和视频直接导入到 Yundera 服务器上的 Immich。PhotoBridge 将 immich-go 工具封装在简单的网页界面中，提供验证、配置和实时进度跟踪功能。

      **主要功能：**
      - 从 /import 卷导入本地文件（无大小限制）
      - 通过浏览器直接上传照片、视频或 ZIP 文件
      - 自动 ZIP 解压并基于文件夹创建相册
      - 导入前文件验证
      - 相册和元数据保留（日期、位置、描述）
      - 试运行模式预览
      - 实时导入进度日志
      - 自动重复检测

      **使用方法：**
      1. 选择导入方式：
         - **本地文件：**通过 Files 应用将文件放入 `/DATA/Gallery/Import/`，然后在 PhotoBridge 中选择
         - **直接上传：**通过浏览器在 PhotoBridge 中直接上传
      2. 打开 PhotoBridge 并输入 Immich API 密钥（授予所有权限）
      3. 选择文件、验证并开始导入
    fr_fr: |
      **PhotoBridge for Immich — Importateur de photos et videos**

      Importez vos photos et videos directement dans Immich sur votre serveur Yundera. PhotoBridge encapsule l'outil immich-go avec une interface web simple pour la validation, la configuration et le suivi en temps reel.

      **Fonctionnalites principales :**
      - Import de fichiers locaux depuis le volume /import (sans limite de taille)
      - Upload direct de photos, videos ou fichiers ZIP depuis votre navigateur
      - Extraction automatique des ZIP avec creation d'albums par dossier
      - Validation des fichiers avant import
      - Preservation des albums et metadonnees (dates, lieux, descriptions)
      - Mode simulation pour previsualiser
      - Logs de progression en temps reel
      - Detection automatique des doublons

      **Comment utiliser :**
      1. Choisissez votre methode d'import :
         - **Fichiers locaux :** Placez les fichiers dans `/DATA/Gallery/Import/` via l'app Fichiers, puis selectionnez-les dans PhotoBridge
         - **Upload direct :** Uploadez directement via PhotoBridge depuis votre navigateur
      2. Ouvrez PhotoBridge et entrez votre cle API Immich (accordez toutes les permissions)
      3. Selectionnez les fichiers, validez et lancez l'import
    es_es: |
      **PhotoBridge for Immich — Importador de fotos y videos**

      Importe sus fotos y videos directamente a Immich en su servidor Yundera. PhotoBridge envuelve la herramienta immich-go con una interfaz web simple para validacion, configuracion y seguimiento en tiempo real.

      **Caracteristicas principales:**
      - Importacion de archivos locales desde el volumen /import (sin limite de tamano)
      - Carga directa de fotos, videos o archivos ZIP desde su navegador
      - Extraccion automatica de ZIP con creacion de albumes por carpeta
      - Validacion de archivos antes de importar
      - Preservacion de albumes y metadatos (fechas, ubicaciones, descripciones)
      - Modo de prueba para previsualizar
      - Registros de progreso en tiempo real
      - Deteccion automatica de duplicados

      **Como usar:**
      1. Elija su metodo de importacion:
         - **Archivos locales:** Coloque archivos en `/DATA/Gallery/Import/` via la app Archivos, luego seleccionelos en PhotoBridge
         - **Carga directa:** Suba archivos directamente a traves de PhotoBridge desde su navegador
      2. Abra PhotoBridge e ingrese su clave API de Immich (otorgue todos los permisos)
      3. Seleccione archivos, valide e inicie la importacion
  tagline:
    en_us: Import photos & videos into Immich
    ko_kr: 사진 및 동영상을 Immich로 가져오기
    zh_cn: 将照片和视频导入 Immich
    fr_fr: Importez vos photos et videos dans Immich
    es_es: Importe fotos y videos a Immich
  title:
    en_us: PhotoBridge
  tips:
    before_install:
      en_us: |
        **Before you start:**

        1. Make sure **Immich** is installed and running on your PCS
        2. Generate an API key in Immich (Account Settings -> API Keys -> grant **all permissions**)
        3. Choose your import method:
           - **Local Files:** Place files in `/DATA/Gallery/Import/` via the **Files** app, then select them in PhotoBridge (no size limit)
           - **Direct Upload:** Upload files directly through PhotoBridge from your browser

        PhotoBridge will validate your files and upload everything to Immich with preserved albums and metadata.
      ko_kr: |
        **시작하기 전:**

        1. PCS에 **Immich**가 설치되어 실행 중인지 확인하세요
        2. Immich에서 API 키를 생성하세요 (계정 설정 -> API 키 -> **모든 권한** 부여)
        3. 가져오기 방법을 선택하세요:
           - **로컬 파일:** **Files** 앱으로 `/DATA/Gallery/Import/`에 파일을 넣은 후, PhotoBridge에서 선택 (크기 제한 없음)
           - **직접 업로드:** 브라우저에서 PhotoBridge를 통해 직접 업로드

        PhotoBridge가 파일을 검증하고 앨범과 메타데이터를 보존하며 모든 것을 Immich에 업로드합니다.
  index: /
