name: psitransfer

services:
  psitransfer:
    image: psitrax/psitransfer:v2.4.1
    container_name: psitransfer
    user: 0:0
    restart: unless-stopped
    
    cpu_shares: 50
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

    expose:
      - 80
    labels:
      caddy_0: psitransfer-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: psitransfer-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: psitransfer-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    networks:
      - pcs

    environment:
      - PUID=0
      - PGID=0
      - TZ=$TZ
      - PSITRANSFER_ADMIN_PASS=$APP_DEFAULT_PASSWORD
      - PSITRANSFER_UPLOAD_PASS=$APP_DEFAULT_PASSWORD
      - PSITRANSFER_UPLOAD_DIR=/data
      - PSITRANSFER_PORT=80
      - PSITRANSFER_DEFAULT_RETENTION=86400
      - PSITRANSFER_IFACE=0.0.0.0
    
    volumes:
      - /DATA/AppData/$AppID/data/:/data
      - /DATA/AppData/$AppID/config/:/app/config

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: psitransfer
  author: CasaOS Team
  category: Utilities
  description:
    en_us: |
      PsiTransfer is a simple, open-source, self-hosted file sharing solution. It's designed as a lightweight alternative to WeTransfer with powerful features:
      
      - **No accounts required** - Share files instantly without registration
      - **Resumable uploads/downloads** - Using tus.io protocol for reliable transfers
      - **Mobile-friendly** - Responsive interface works on all devices
      - **Password protection** - Secure your file shares with passwords
      - **Flexible retention** - Set custom expiration times for uploads
      - **One-time downloads** - Files can be set to delete after first download
      - **Admin dashboard** - Monitor and manage all uploads
      - **ZIP/TAR.GZ export** - Download multiple files as archives
      - **Large file support** - No file size limits, only disk space
      - **Lightweight** - Less than 100KB gzipped frontend
      
      Perfect for sharing large files with colleagues, clients, or friends without relying on cloud services.
    ko_kr: |
      PsiTransfer는 간단하고 오픈소스인 자체 호스팅 파일 공유 솔루션입니다. WeTransfer의 가벼운 대안으로 강력한 기능을 제공합니다:
      
      - **계정 불필요** - 회원가입 없이 즉시 파일 공유
      - **재개 가능한 업로드/다운로드** - tus.io 프로토콜로 안정적인 전송
      - **모바일 친화적** - 모든 기기에서 작동하는 반응형 인터페이스
      - **비밀번호 보호** - 비밀번호로 파일 공유 보안
      - **유연한 보관 기간** - 업로드에 대한 맞춤 만료 시간 설정
      - **일회성 다운로드** - 첫 다운로드 후 파일 삭제 가능
      - **관리자 대시보드** - 모든 업로드 모니터링 및 관리
      - **ZIP/TAR.GZ 내보내기** - 여러 파일을 압축 파일로 다운로드
      - **대용량 파일 지원** - 파일 크기 제한 없음, 디스크 공간만 제한
      - **가벼움** - 100KB 미만의 Gzip 압축 프론트엔드
      
      클라우드 서비스에 의존하지 않고 동료, 고객 또는 친구와 대용량 파일을 공유하는 데 완벽합니다.
    zh_cn: |
      PsiTransfer 是一个简单、开源、自托管的文件共享解决方案。它是 WeTransfer 的轻量级替代方案，具有强大的功能：

      - **无需账户** - 无需注册即可立即共享文件
      - **可断点续传** - 使用 tus.io 协议实现可靠传输
      - **移动端友好** - 响应式界面适用于所有设备
      - **密码保护** - 用密码保护您的文件共享
      - **灵活的保留期** - 为上传设置自定义过期时间
      - **一次性下载** - 文件可在首次下载后删除
      - **管理面板** - 监控和管理所有上传
      - **ZIP/TAR.GZ 导出** - 将多个文件作为压缩包下载
      - **大文件支持** - 无文件大小限制，仅受磁盘空间限制
      - **轻量级** - 前端压缩后不到 100KB

      非常适合与同事、客户或朋友共享大文件，无需依赖云服务。
    fr_fr: |
      PsiTransfer est une solution de partage de fichiers simple, open-source et auto-hébergée. C'est une alternative légère à WeTransfer avec des fonctionnalités puissantes :

      - **Aucun compte requis** - Partagez des fichiers instantanément sans inscription
      - **Téléchargements reprenables** - Protocole tus.io pour des transferts fiables
      - **Adapté aux mobiles** - Interface responsive sur tous les appareils
      - **Protection par mot de passe** - Sécurisez vos partages avec des mots de passe
      - **Rétention flexible** - Définissez des temps d'expiration personnalisés
      - **Téléchargements uniques** - Les fichiers peuvent être supprimés après le premier téléchargement
      - **Tableau de bord admin** - Surveillez et gérez tous les téléversements
      - **Export ZIP/TAR.GZ** - Téléchargez plusieurs fichiers en archives
      - **Support grands fichiers** - Aucune limite de taille, seulement l'espace disque
      - **Léger** - Frontend de moins de 100 Ko compressé

      Parfait pour partager de gros fichiers avec des collègues, clients ou amis sans dépendre de services cloud.
    es_es: |
      PsiTransfer es una solución de compartición de archivos simple, de código abierto y autoalojada. Es una alternativa ligera a WeTransfer con características poderosas:

      - **Sin cuentas necesarias** - Comparte archivos al instante sin registro
      - **Cargas/descargas reanudables** - Protocolo tus.io para transferencias confiables
      - **Compatible con móviles** - Interfaz responsiva en todos los dispositivos
      - **Protección con contraseña** - Asegura tus archivos compartidos con contraseñas
      - **Retención flexible** - Establece tiempos de expiración personalizados
      - **Descargas únicas** - Los archivos pueden eliminarse después de la primera descarga
      - **Panel de administración** - Monitorea y gestiona todas las cargas
      - **Exportación ZIP/TAR.GZ** - Descarga múltiples archivos como archivos comprimidos
      - **Soporte de archivos grandes** - Sin límites de tamaño, solo espacio en disco
      - **Ligero** - Frontend de menos de 100KB comprimido

      Perfecto para compartir archivos grandes con colegas, clientes o amigos sin depender de servicios en la nube.
