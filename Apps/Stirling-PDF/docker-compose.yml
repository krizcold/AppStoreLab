name: stirlingpdf

services:
  stirlingpdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:2.9.2
    container_name: stirling-pdf
    restart: unless-stopped
    expose:
      - 80
    labels:
      caddy_0: stirlingpdf-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: stirlingpdf-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: stirlingpdf-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    networks:
      - pcs
    volumes:
      - /DATA/AppData/$AppID/tessdata/:/usr/share/tessdata/
      - /DATA/AppData/$AppID/configs/:/configs/
      - /DATA/AppData/$AppID/logs/:/logs/
      - /DATA/AppData/$AppID/customFiles/:/customFiles/
      - /DATA/AppData/$AppID/pipeline/:/pipeline/
      - /DATA/Downloads/:/downloads/
      - /DATA/AppData/$AppID/tmp/:/tmp/
    user: "0:0"  # Root user required for Java runtime and PDF tools - see rationale.md
    environment:
      PGID: 0
      PUID: 0
      TZ: $TZ
      DOCKER_ENABLE_SECURITY: true
      SECURITY_ENABLELOGIN: true
      SECURITY_INITIALLOGIN_USERNAME: admin
      SECURITY_INITIALLOGIN_PASSWORD: $APP_DEFAULT_PASSWORD
      DISABLE_ADDITIONAL_FEATURES: true
      SYSTEM_DEFAULTLOCALE: en_US
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: false
      TMPDIR: /tmp
      # Optimized Java memory management - prevents OOM errors and improves stability
      JAVA_TOOL_OPTIONS: "-XX:+UnlockExperimentalVMOptions -XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=40 -XX:MinRAMPercentage=30 -XX:+UseG1GC -XX:+UseStringDeduplication -XX:G1PeriodicGCInterval=30000 -XX:MaxGCPauseMillis=200 -XX:+ParallelRefProcEnabled -Djava.io.tmpdir=/tmp"
      SERVER_PORT: 80  # Run on port 80 for NSL router compatibility
    deploy:
      resources:
        limits:
          memory: 5G  # Increased from 4G for better stability with large PDFs
          cpus: '1.0'  # Increased from 1.0 for better performance
        reservations:
          memory: 2G  # Reserve minimum memory
    cpu_shares: 50  # Standard application priority

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: stirlingpdf
  webui_port: 80
  author: Yundera Team
  category: Office
  developer: Stirling Tools
  description:
    en_us: |
      **Your complete PDF toolkit - everything you need to work with PDF files, right from your web browser.**

      Tired of paying for expensive PDF software or worried about uploading sensitive documents to online services? Stirling PDF solves this by running entirely on your server - your files never leave your device.

      **What you can do:**
      • **Split & Merge**: Break large PDFs into smaller files or combine multiple PDFs into one
      • **Convert**: Turn PDFs into images, Word documents, Excel files, or PowerPoint presentations
      • **Compress**: Reduce file size to save space and make sharing easier  
      • **Edit**: Add text, images, signatures, watermarks, or remove pages
      • **Organize**: Rotate pages, reorder sections, or extract specific pages
      • **Security**: Add passwords, remove passwords, or redact sensitive information
      • **OCR**: Extract text from scanned documents and images

      **Why choose Stirling PDF:**
      • **Private & Secure**: All processing happens on your server - your files never leave your device
      • **No file size limits**: Work with PDFs of any size
      • **No subscription fees**: Completely free with no ads or hidden costs
      • **Works anywhere**: Access from any device with a web browser
      • **Professional quality**: Get the same results as expensive PDF software

      Perfect for students, professionals, or anyone who works with PDF documents regularly. No more paying for expensive PDF software or worrying about uploading sensitive documents to online services.
    ko_kr: |
      **완전한 PDF 툴킷 - 웹 브라우저에서 바로 PDF 파일 작업에 필요한 모든 것.**

      비싼 PDF 소프트웨어 비용을 지불하거나 민감한 문서를 온라인 서비스에 업로드하는 것에 대해 걱정하시나요? Stirling PDF는 완전히 당신의 서버에서 실행되어 이 문제를 해결합니다 - 파일이 기기를 떠나지 않습니다.

      **할 수 있는 일들:**
      • **분할 및 병합**: 큰 PDF를 작은 파일로 나누거나 여러 PDF를 하나로 합치기
      • **변환**: PDF를 이미지, Word 문서, Excel 파일, PowerPoint 프레젠테이션으로 변환
      • **압축**: 파일 크기를 줄여서 공간을 절약하고 공유를 쉽게 만들기
      • **편집**: 텍스트, 이미지, 서명, 워터마크 추가 또는 페이지 제거
      • **정리**: 페이지 회전, 섹션 재정렬, 특정 페이지 추출
      • **보안**: 비밀번호 추가, 비밀번호 제거, 민감한 정보 편집
      • **OCR**: 스캔한 문서와 이미지에서 텍스트 추출

      **왜 Stirling PDF를 선택해야 할까요:**
      • **개인정보 보호 및 보안**: 모든 처리가 당신의 서버에서 일어남 - 파일이 기기를 떠나지 않음
      • **파일 크기 제한 없음**: 어떤 크기의 PDF든 작업 가능
      • **구독료 없음**: 광고나 숨겨진 비용 없이 완전 무료
      • **어디서나 작동**: 웹 브라우저가 있는 모든 기기에서 접근
      • **전문가 품질**: 비싼 PDF 소프트웨어와 같은 결과

      PDF 문서를 정기적으로 다루는 학생, 전문가, 또는 누구에게나 완벽합니다. 더 이상 비싼 PDF 소프트웨어 비용을 지불하거나 민감한 문서를 온라인 서비스에 업로드하는 것에 대해 걱정할 필요가 없습니다.
    zh_cn: |
      **您完整的PDF工具包 - 直接从网页浏览器处理PDF文件所需的一切。**

      厌倦了支付昂贵的PDF软件费用或担心将敏感文档上传到在线服务？Stirling PDF通过完全在您的服务器上运行来解决这个问题 - 您的文件永远不会离开您的设备。

      **您可以做什么:**
      • **拆分和合并**: 将大PDF分解为小文件或将多个PDF合并为一个
      • **转换**: 将PDF转换为图像、Word文档、Excel文件或PowerPoint演示文稿
      • **压缩**: 减少文件大小以节省空间并使共享更容易
      • **编辑**: 添加文本、图像、签名、水印或删除页面
      • **整理**: 旋转页面、重新排列部分或提取特定页面
      • **安全**: 添加密码、删除密码或编辑敏感信息
      • **OCR**: 从扫描的文档和图像中提取文本

      **为什么选择Stirling PDF:**
      • **私密和安全**: 所有处理都在您的服务器上进行 - 您的文件永远不会离开您的设备
      • **无文件大小限制**: 处理任何大小的PDF
      • **无订阅费用**: 完全免费,无广告或隐藏费用
      • **随处可用**: 从任何有网页浏览器的设备访问
      • **专业品质**: 获得与昂贵PDF软件相同的结果

      非常适合经常处理PDF文档的学生、专业人士或任何人。无需再为昂贵的PDF软件付费或担心将敏感文档上传到在线服务。
    fr_fr: |
      **Votre boîte à outils PDF complète - tout ce dont vous avez besoin pour travailler avec des fichiers PDF, directement depuis votre navigateur web.**

      Fatigué de payer pour des logiciels PDF coûteux ou inquiet de télécharger des documents sensibles vers des services en ligne ? Stirling PDF résout ce problème en fonctionnant entièrement sur votre serveur - vos fichiers ne quittent jamais votre appareil.

      **Ce que vous pouvez faire :**
      • **Diviser et fusionner** : Séparer de gros PDF en fichiers plus petits ou combiner plusieurs PDF en un seul
      • **Convertir** : Transformer les PDF en images, documents Word, fichiers Excel ou présentations PowerPoint
      • **Compresser** : Réduire la taille du fichier pour économiser l'espace et faciliter le partage
      • **Éditer** : Ajouter du texte, des images, des signatures, des filigranes ou supprimer des pages
      • **Organiser** : Faire pivoter les pages, réorganiser les sections ou extraire des pages spécifiques
      • **Sécurité** : Ajouter des mots de passe, supprimer des mots de passe ou caviarder des informations sensibles
      • **OCR** : Extraire du texte de documents scannés et d'images

      **Pourquoi choisir Stirling PDF :**
      • **Privé et sécurisé** : Tout le traitement se fait sur votre serveur - vos fichiers ne quittent jamais votre appareil
      • **Pas de limites de taille de fichier** : Travaillez avec des PDF de toute taille
      • **Pas de frais d'abonnement** : Entièrement gratuit sans publicités ni coûts cachés
      • **Fonctionne partout** : Accès depuis n'importe quel appareil avec un navigateur web
      • **Qualité professionnelle** : Obtenez les mêmes résultats que les logiciels PDF coûteux

      Parfait pour les étudiants, les professionnels ou toute personne qui travaille régulièrement avec des documents PDF. Fini de payer pour des logiciels PDF coûteux ou de s'inquiéter de télécharger des documents sensibles vers des services en ligne.
    es_es: |
      **Tu kit completo de herramientas PDF - todo lo que necesitas para trabajar con archivos PDF, directamente desde tu navegador web.**

      ¿Cansado de pagar por software PDF caro o preocupado por subir documentos sensibles a servicios en línea? Stirling PDF resuelve esto ejecutándose completamente en tu servidor - tus archivos nunca salen de tu dispositivo.

      **Lo que puedes hacer:**
      • **Dividir y combinar**: Separar PDFs grandes en archivos más pequeños o combinar múltiples PDFs en uno
      • **Convertir**: Convertir PDFs en imágenes, documentos Word, archivos Excel o presentaciones PowerPoint
      • **Comprimir**: Reducir el tamaño del archivo para ahorrar espacio y facilitar el intercambio
      • **Editar**: Agregar texto, imágenes, firmas, marcas de agua o eliminar páginas
      • **Organizar**: Rotar páginas, reordenar secciones o extraer páginas específicas
      • **Seguridad**: Agregar contraseñas, eliminar contraseñas o censurar información sensible
      • **OCR**: Extraer texto de documentos escaneados e imágenes

      **Por qué elegir Stirling PDF:**
      • **Privado y seguro**: Todo el procesamiento ocurre en tu servidor - tus archivos nunca salen de tu dispositivo
      • **Sin límites de tamaño de archivo**: Trabaja con PDFs de cualquier tamaño
      • **Sin tarifas de suscripción**: Completamente gratis sin anuncios ni costos ocultos
      • **Funciona en cualquier lugar**: Acceso desde cualquier dispositivo con navegador web
      • **Calidad profesional**: Obtén los mismos resultados que el software PDF caro

      Perfecto para estudiantes, profesionales o cualquiera que trabaje regularmente con documentos PDF. No más pagar por software PDF caro o preocuparse por subir documentos sensibles a servicios en línea.
