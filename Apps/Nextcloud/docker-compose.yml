  # Pre-create AppData subdirs as PUID:PGID using a root container, otherwise the
  # docker daemon (running as root) creates the bind-mount source dirs and the
  # nextcloud container running as PUID:PGID can't write into them. Uses literal
  # "nextcloud" because $AppID is NOT exported into the install-cmd shell env.
  pre-install-cmd: |
    docker run --rm -v /DATA/AppData/nextcloud:/data alpine sh -c "mkdir -p /data/root /data/config /data/data /data/apps /data/db /data/redis && chown -R $PUID:$PGID /data"

  # Idempotent: re-running is safe.
  # NOTE: bash variables ($timeout, $((...))) are escaped with $$ so compose-go
  # does not interpolate them at YAML save time (it would replace $timeout with
  # an empty string, breaking the wait loop — see APPSTORE-PR-GUIDE §6.4).
  post-install-cmd: |
    timeout=300
    while [ $$timeout -gt 0 ]; do
      if docker exec nextcloud php occ status 2>/dev/null | grep -q 'installed: true'; then
        echo "NextCloud installation complete"
        break
      fi
      echo "Waiting for NextCloud auto-installation... $$timeout s remaining"
      sleep 5
      timeout=$$((timeout-5))
    done &&
    docker exec nextcloud bash -c '
      if [ -f /var/www/html/.htaccess ] && ! grep -q "Strict-Transport-Security" /var/www/html/.htaccess; then
        echo "Header always set Strict-Transport-Security \"max-age=15552000; includeSubDomains\"" >> /var/www/html/.htaccess
        echo "HSTS header added to .htaccess"
      else
        echo "HSTS header already present or .htaccess not found"
      fi
      php occ background:cron && echo "Background jobs configured to use cron"
    '
  tips:
