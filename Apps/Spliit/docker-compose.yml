name: spliit
services:
  nginxhashlock:
    image: ghcr.io/yundera/nginx-hash-lock:latest
    container_name: spliit-nginxhashlock
    restart: unless-stopped
    user: "root"
    environment:
      AUTH_HASH: $AUTH_HASH
      USER: admin
      PASSWORD: spliit
      BACKEND_HOST: "spliit"
      BACKEND_PORT: "3000"
      LISTEN_PORT: "80"
    expose:
      - 80
    labels:
      caddy_0: spliit-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: spliit-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: spliit-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    depends_on:
      spliit:
        condition: service_started
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    cpu_shares: 80
    networks:
      - pcs
      - spliit-internal
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN

  db:
    image: postgres:16.13-alpine
    container_name: spliit-db
    user: 0:0
    cpu_shares: 50
    environment:
      POSTGRES_DB: spliit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: $APP_DEFAULT_PASSWORD
      TZ: UTC
    volumes:
      - /DATA/AppData/spliit/pgdata/:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spliit"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - spliit-internal
    deploy:
      resources:
        limits:
          memory: 512M

  spliit:
    image: ghcr.io/spliit-app/spliit:1.19.1
    container_name: spliit
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 50
    environment:
      TZ: $TZ
      POSTGRES_PRISMA_URL: postgresql://postgres:$APP_DEFAULT_PASSWORD@db:5432/spliit
      POSTGRES_URL_NON_POOLING: postgresql://postgres:$APP_DEFAULT_PASSWORD@db:5432/spliit
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spliit-internal
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  spliit-internal:
    driver: bridge
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: nginxhashlock
  webui_port: 80
  author: Yundera Team
  category: Finance
  developer: Spliit Team
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Spliit/thumbnail.png
  index: /?hash=$AUTH_HASH
  store_app_id: Spliit
  title:
    en_us: Spliit
    ko_kr: Spliit
    zh_cn: Spliit
    fr_fr: Spliit
    es_es: Spliit
  tagline:
    en_us: Free and Open Source Expense Sharing App
    ko_kr: 무료 오픈소스 비용 분할 앱
    zh_cn: 免费开源费用分摊应用
    es_es: Aplicación Gratuita para Compartir Gastos
    fr_fr: Application Gratuite de Partage de Dépenses
  description:
    en_us: |
      Split expenses with friends - no signup, no hassle. Spliit is the simplest way to share expenses. Whether splitting dinner bills, vacation costs, or household expenses, everyone can see who owes what instantly. No accounts needed - just create a group and share the link.
      
      **Key features:**
      • Create expense groups in seconds
      • Add participants by name only
      • Split by percentage, shares, or exact amounts
      • See optimized settlements (who pays whom)
      • Works on any device
      • Complete privacy - data stays on your server
      
      **Perfect for:** Roommates splitting rent, friends sharing vacation costs, couples managing household expenses, group dinners, or any shared activity.
    ko_kr: |
      친구와 비용 분할 - 가입 없이, 번거로움 없이. Spliit은 비용을 공유하는 가장 간단한 방법입니다. 저녁 식사비, 휴가 비용, 가계 지출 등 누가 얼마를 빚졌는지 즉시 확인할 수 있습니다.
    zh_cn: |
      与朋友分摊费用 - 无需注册，没有麻烦。Spliit 是分摊费用最简单的方式。无论是分摊晚餐账单、度假费用还是家庭开支，每个人都能立即看到谁欠谁多少。
    es_es: |
      Divide gastos con amigos - sin registro, sin complicaciones. Spliit es la forma más simple de compartir gastos. Ya sea dividiendo cuentas de cena, costos de vacaciones o gastos del hogar.
    fr_fr: |
      Partagez les dépenses avec vos amis - sans inscription, sans tracas. Spliit est le moyen le plus simple de partager les dépenses. Qu'il s'agisse de diviser l'addition du dîner, les frais de vacances ou les dépenses du foyer.
  tips:
    before_install:
      en_us: |
        **Default Login (for guests visiting shared links):**

        | Field    | Value   |
        |----------|---------|
        | Username | `admin` |
        | Password | `spliit`|

        You can change these in the app's environment settings before installing.
        -----------------------------
        **How to use:**
        1. Click "Create a group"
        2. Name it (e.g., "Beach Trip 2024")
        3. Add people (just their names)
        4. Start adding expenses
        5. Check "Balances" to see who owes whom
        -----------------------------
        Share the group link with friends - they will need the credentials above to access it.
      ko_kr: |
        **기본 로그인 (공유 링크 방문자용):**

        | 항목     | 값      |
        |----------|---------|
        | 사용자명 | `admin` |
        | 비밀번호 | `spliit`|

        설치 전 앱의 환경 설정에서 변경할 수 있습니다.
        -----------------------------
        **사용 방법:**
        1. "그룹 만들기" 클릭
        2. 이름 지정 (예: "제주도 여행 2024")
        3. 사람 추가 (이름만)
        4. 비용 추가 시작
        5. "잔액"을 확인하여 누가 누구에게 빚졌는지 확인
        -----------------------------
        그룹 링크를 친구와 공유하세요 - 위 자격증명이 필요합니다.
      zh_cn: |
        **默认登录（访问共享链接的访客）：**

        | 字段   | 值      |
        |--------|---------|
        | 用户名 | `admin` |
        | 密码   | `spliit`|

        您可以在安装前在应用的环境设置中更改这些。
        -----------------------------
        **使用方法：**
        1. 点击"创建群组"
        2. 命名（例如："2024海滩之旅"）
        3. 添加人员（只需姓名）
        4. 开始添加费用
        5. 查看"余额"了解谁欠谁
        -----------------------------
        与朋友分享群组链接 - 他们需要上面的凭据才能访问。
      es_es: |
        **Inicio de sesión predeterminado (para invitados con enlaces compartidos):**

        | Campo      | Valor   |
        |------------|---------|
        | Usuario    | `admin` |
        | Contraseña | `spliit`|

        Puedes cambiarlos en la configuración de entorno de la app antes de instalar.
        -----------------------------
        **Cómo usar:**
        1. Haz clic en "Crear un grupo"
        2. Nómbralo (ej: "Viaje Playa 2024")
        3. Añade personas (solo nombres)
        4. Empieza a añadir gastos
        5. Revisa "Saldos" para ver quién debe a quién
        -----------------------------
        Comparte el enlace del grupo con amigos - necesitarán las credenciales anteriores.
      fr_fr: |
        **Connexion par défaut (pour les invités avec liens partagés) :**

        | Champ         | Valeur  |
        |---------------|---------|
        | Utilisateur   | `admin` |
        | Mot de passe  | `spliit`|

        Vous pouvez les modifier dans les paramètres d'environnement de l'app avant l'installation.
        -----------------------------
        **Comment utiliser:**
        1. Cliquez sur "Créer un groupe"
        2. Nommez-le (ex: "Voyage Plage 2024")
        3. Ajoutez des personnes (juste les noms)
        4. Commencez à ajouter des dépenses
        5. Vérifiez "Soldes" pour voir qui doit à qui
        -----------------------------
        Partagez le lien du groupe avec vos amis - ils auront besoin des identifiants ci-dessus.
