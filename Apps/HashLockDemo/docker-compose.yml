name: hashlockdemo

services:
  hashlockdemo:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.7
    container_name: hashlockdemo
    restart: unless-stopped
    user: "0:0"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
    expose:
      - "80"
    labels:
      caddy_0: hashlockdemo-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: hashlockdemo-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: hashlockdemo-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    environment:
      # Presence of OIDC_REGISTRAR_URL enables OIDC mode. The sidecar self-registers
      # with the PCS's auth-registrar on first login — no other auth config needed.
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
      BACKEND_HOST: "whoami"
      BACKEND_PORT: "80"
      LISTEN_PORT: "80"
    depends_on:
      - whoami
    networks:
      - pcs

  whoami:
    image: traefik/whoami:v1.10
    container_name: hashlockdemo-whoami
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.1'
    expose:
      - "80"
    networks:
      - pcs

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: hashlockdemo
  webui_port: 80
  index: /
  author: yundera
  developer: yundera
  category: Developer
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/HashLockDemo/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/HashLockDemo/screenshot-1.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStoreLab@main/Apps/HashLockDemo/screenshot-1.png
  store_app_id: hashlockdemo
  is_uncontrolled: false
  title:
    en_us: Hash Lock OIDC Demo
  tagline:
    en_us: "Reference deployment — protect any app with Yundera OIDC in 5 lines of compose"
  description:
    en_us: |
      **🔐 What this demonstrates**

      A minimal reference deployment showing how to put **any HTTP backend** behind
      Yundera's built-in Authelia via OIDC, using `nginx-hash-lock` as a sidecar.

      The protected backend is [`traefik/whoami`](https://hub.docker.com/r/traefik/whoami)
      — a tiny container that echoes the incoming HTTP request. After you log in
      through Authelia, you'll see the request headers that hash-lock forwarded
      to the backend, proving authentication succeeded and the session cookie
      was accepted.

      **✨ Zero secrets to configure**

      The hash-lock sidecar auto-registers as an OIDC client with the PCS's
      `auth-registrar` service on first login. No client IDs, no secrets, no
      issuer URL to paste in. Open the compose file to see the whole setup:

      ```yaml
      environment:
        OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
        BACKEND_HOST: "<your-backend>"
        BACKEND_PORT: "<port>"
        LISTEN_PORT: "80"
      ```

      That single `OIDC_REGISTRAR_URL` is what enables OIDC mode — swap `whoami`
      for your own container and you've protected it.

      **🧱 What's inside**

      • `hashlockdemo` — the `nginx-hash-lock:1.0.7` sidecar in OIDC mode
      • `hashlockdemo-whoami` — `traefik/whoami:v1.10` as the protected backend
      • Talks to the `pcs`-network `auth-registrar` + `authelia` provided by the PCS

      **🎯 Who this is for**

      App developers who want to add SSO to their Yundera apps without threading
      OIDC secrets through compose. Fork this app, swap the backend, ship.
  tips:
    before_install:
      en_us: |
        **📋 Requires Yundera PCS with Authelia stack**

        This demo only works on a PCS running the Authelia + `auth-registrar`
        services (provisioned automatically by the current `template-root`).
        If you're on an older PCS, install fails at first login with a DNS
        error for `auth-registrar` in the hash-lock logs.

        **🔑 Login credentials**

        Your PCS's `DEFAULT_USER` / `DEFAULT_PWD` from
        `/DATA/AppData/casaos/apps/yundera/.pcs.secret.env`. Standard Yundera
        admin creds.

        **🚀 First-visit flow**

        1. Open the app URL → hash-lock returns `302 → /nhl-auth/oidc/login`
        2. Sidecar POSTs to `auth-registrar` → gets a fresh OIDC client
        3. Browser is bounced to Authelia's login page
        4. Enter admin credentials → redirected back to `whoami` output
        5. You'll see the request headers the backend received

        **⚠️ Container-naming constraint**

        If you fork this app, keep the service name, `container_name`,
        `store_app_id`, and top-level `name:` all matching each other
        (lowercase alnum + `-`). The mesh-router routes subdomains by
        container name, and `auth-registrar` derives the OIDC `client_id`
        from the same name via PTR lookup on the `pcs` network.

        **💾 Resources:** ~160MB memory, ~0.3 CPU cores
  pre-install-cmd: |
    mkdir -p /DATA/AppData/hashlockdemo 2>/dev/null || true
    chmod -R 755 /DATA/AppData/hashlockdemo/ 2>/dev/null || true
